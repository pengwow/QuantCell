# 指标生成思维链配置文件
# 用于定义AI技术指标生成的思维链步骤

[thinking_chain]
name = "指标生成思维链"
chain_type = "indicator_generation"
description = "用于生成技术指标的标准思维链流程，包含需求分析、指标设计、代码生成和验证优化四个步骤"

[[thinking_chain.steps]]
title = "需求分析"
description = """
分析用户提供的指标需求，提取关键要素：
1. 识别指标类型（趋势类、震荡类、成交量类、波动率类等）
2. 确定计算周期和参数范围
3. 明确输入数据源（开盘价、收盘价、最高价、最低价、成交量等）
4. 识别输出信号类型（数值、信号线、交叉信号等）
5. 确认指标应用场景（选股、择时、过滤等）

输出：结构化的指标需求规格说明
"""
order = 1

[[thinking_chain.steps]]
title = "指标设计"
description = """
基于需求分析，设计指标计算逻辑：
1. 确定核心计算公式和数学表达式
2. 设计参数配置（周期、平滑系数等）
3. 规划指标线和信号线的计算方法
4. 设计阈值和极值判断逻辑
5. 确定与其他指标的组合方式

输出：指标设计文档和计算公式
"""
order = 2

[[thinking_chain.steps]]
title = "代码生成"
description = """
根据指标设计，生成完整的Python代码：
1. 实现指标计算函数或类
2. 处理边界条件和异常值
3. 添加参数验证和类型注解
4. 实现向量化计算以提高性能
5. 添加详细的文档字符串和使用示例

输出：完整的、可运行的指标代码
"""
order = 3

[[thinking_chain.steps]]
title = "验证优化"
description = """
验证指标的正确性和性能：
1. 检查数学计算是否正确
2. 验证边界条件处理
3. 测试不同参数组合的效果
4. 检查数值稳定性（除零、NaN等）
5. 优化计算性能（向量化、缓存等）

输出：验证报告和优化后的代码
"""
order = 4
