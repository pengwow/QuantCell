# 思维链配置文件模板
# 用于定义AI策略生成的思维链步骤

[thinking_chain]
name = "策略生成思维链"
chain_type = "strategy_generation"
description = "用于生成交易策略的标准思维链流程，包含需求分析、策略设计、代码生成和代码验证四个步骤"

[[thinking_chain.steps]]
title = "需求分析"
description = """
分析用户提供的策略需求，提取关键要素：
1. 识别策略类型（趋势跟踪、均值回归、突破等）
2. 提取交易标的和时间周期
3. 确定入场条件和出场条件
4. 识别风险管理和资金管理要求
5. 确认技术指标和参数需求

输出：结构化的需求分析报告
"""
order = 1

[[thinking_chain.steps]]
title = "策略设计"
description = """
基于需求分析结果，设计策略架构：
1. 确定策略类结构和继承关系
2. 设计指标计算和数据处理方法
3. 规划信号生成逻辑
4. 设计仓位管理和风险控制模块
5. 确定参数配置和优化方向

输出：策略设计文档和伪代码
"""
order = 2

[[thinking_chain.steps]]
title = "代码生成"
description = """
根据策略设计文档，生成完整的Python代码：
1. 实现策略类，继承自Strategy基类
2. 实现__init__方法，初始化参数和指标
3. 实现on_bar或on_tick方法，处理数据更新
4. 实现交易信号生成逻辑
5. 添加必要的注释和文档字符串

输出：完整的、可运行的策略代码
"""
order = 3

[[thinking_chain.steps]]
title = "代码验证"
description = """
验证生成的代码质量和正确性：
1. 检查Python语法是否正确
2. 验证策略类是否正确继承基类
3. 检查必要的抽象方法是否实现
4. 验证参数类型和默认值是否合理
5. 检查是否存在潜在的错误或异常

输出：验证报告和修复建议（如有问题）
"""
order = 4
